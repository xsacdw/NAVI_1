<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lotto - 5게임 행운 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ===== DARK MODE (default) ===== */
        :root,
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --bg-gradient-1: rgba(99, 102, 241, 0.15);
            --bg-gradient-2: rgba(168, 85, 247, 0.15);
            --card-bg: rgba(30, 41, 59, 0.75);
            --card-border: rgba(255, 255, 255, 0.1);
            --row-bg: rgba(255, 255, 255, 0.03);
            --row-border: rgba(255, 255, 255, 0.05);
            --primary-glow: #6366f1;
            --secondary-glow: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --toggle-bg: rgba(255, 255, 255, 0.08);
            --toggle-border: rgba(255, 255, 255, 0.15);
            --toggle-hover: rgba(255, 255, 255, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --h1-gradient: linear-gradient(to bottom right, #fff, #94a3b8);
        }

        /* ===== LIGHT MODE ===== */
        [data-theme="light"] {
            --bg-color: #f0f4ff;
            --bg-gradient-1: rgba(99, 102, 241, 0.08);
            --bg-gradient-2: rgba(168, 85, 247, 0.08);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --row-bg: rgba(0, 0, 0, 0.03);
            --row-border: rgba(0, 0, 0, 0.06);
            --primary-glow: #6366f1;
            --secondary-glow: #a855f7;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --toggle-bg: rgba(0, 0, 0, 0.06);
            --toggle-border: rgba(0, 0, 0, 0.12);
            --toggle-hover: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(99, 102, 241, 0.15);
            --h1-gradient: linear-gradient(to bottom right, #1e293b, #6366f1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, var(--bg-gradient-1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, var(--bg-gradient-2) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 2rem 0;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* ===== THEME TOGGLE BUTTON ===== */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1.5px solid var(--toggle-border);
            background: var(--toggle-bg);
            backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            background: var(--toggle-hover);
            transform: scale(1.1) rotate(15deg);
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 95%;
            max-width: 800px;
            padding: 3rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            animation: fadeIn 0.8s ease-out;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--h1-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
            transition: background 0.4s ease;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
            font-weight: 300;
            transition: color 0.4s ease;
        }

        /* ===== LOTTO GRID ===== */
        .lotto-display {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        .game-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem;
            background: var(--row-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--row-border);
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .game-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--secondary-glow);
            width: 70px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== BALLS ===== */
        .ball {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), inset 0 -4px 6px rgba(0, 0, 0, 0.2);
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ball.show {
            transform: scale(1);
        }

        .color-1 {
            background: linear-gradient(135deg, #fbbf24, #d97706);
        }

        .color-2 {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .color-3 {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .color-4 {
            background: linear-gradient(135deg, #64748b, #475569);
        }

        .color-5 {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        /* ===== GENERATE BUTTON ===== */
        .generate-btn {
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
        }

        .generate-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .generate-btn:hover::after {
            left: 100%;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: color 0.4s ease;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .ball {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }

            .game-row {
                gap: 0.4rem;
                padding: 0.8rem;
            }

            .game-label {
                width: 50px;
                font-size: 0.6rem;
            }

            .theme-toggle {
                top: 1rem;
                right: 1rem;
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Dark/Light Mode Toggle -->
    <button class="theme-toggle" id="themeToggle" title="테마 전환" aria-label="테마 전환">🌙</button>

    <div class="container">
        <h1>Lucky Lotto</h1>
        <p class="subtitle">오늘의 5가지 행운을 추출합니다</p>

        <div class="lotto-display" id="lottoContainer">
            <!-- Game rows will appear here -->
        </div>

        <button class="generate-btn" id="generateBtn">5게임 번호 생성</button>

        <footer>
            &copy; 2026 Premium Lotto Recommendation System. Good Luck!
        </footer>
    </div>

    <script>
        const container = document.getElementById('lottoContainer');
        const btn = document.getElementById('generateBtn');
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // ===== THEME TOGGLE =====
        // Load saved preference
        const savedTheme = localStorage.getItem('lotto-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('lotto-theme', next);
        });

        // ===== LOTTO LOGIC =====
        function getLottoColorClass(num) {
            if (num <= 10) return 'color-1'; // Yellow
            if (num <= 20) return 'color-2'; // Blue
            if (num <= 30) return 'color-3'; // Red
            if (num <= 40) return 'color-4'; // Gray
            return 'color-5';               // Green
        }

        function getLottoNumbers() {
            const numbers = new Set();
            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }

        async function generateLotto() {
            container.innerHTML = '';
            btn.disabled = true;
            btn.textContent = '행운 추출 중...';

            for (let i = 0; i < 5; i++) {
                const row = document.createElement('div');
                row.className = 'game-row';
                row.style.animationDelay = `${i * 0.1}s`;

                const label = document.createElement('div');
                label.className = 'game-label';
                label.textContent = `GAME ${String.fromCharCode(65 + i)}`;
                row.appendChild(label);

                const numbers = getLottoNumbers();
                container.appendChild(row);

                for (let j = 0; j < 6; j++) {
                    await new Promise(r => setTimeout(r, 60));
                    const ball = document.createElement('div');
                    ball.className = `ball ${getLottoColorClass(numbers[j])}`;
                    ball.textContent = numbers[j];
                    row.appendChild(ball);
                    setTimeout(() => ball.classList.add('show'), 10);
                }
                await new Promise(r => setTimeout(r, 100));
            }

            btn.disabled = false;
            btn.textContent = '다른 번호 생성';
        }

        btn.addEventListener('click', generateLotto);
    </script>
</body>

</html>
